<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threads コメント一覧</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, sans-serif;
      background: #f5f5f5;
      padding: 16px;
      max-width: 640px;
      margin: 0 auto;
    }
    h1 { font-size: 18px; margin-bottom: 4px; color: #111; }
    .updated { font-size: 12px; color: #888; margin-bottom: 16px; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .post-ref {
      font-size: 12px;
      color: #888;
      margin-bottom: 10px;
      border-left: 3px solid #ddd;
      padding-left: 8px;
    }
    .post-ref .label {
      font-weight: bold;
      margin-right: 6px;
    }
    .post-ref a { color: #555; text-decoration: none; }
    .comment-box {
      background: #f9f9f9;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }
    .username { font-weight: bold; font-size: 13px; color: #333; }
    .comment-text { font-size: 14px; color: #222; margin: 4px 0; line-height: 1.5; }
    .time { font-size: 11px; color: #aaa; }
    .drafts-title { font-size: 12px; font-weight: bold; color: #555; margin-bottom: 8px; }
    .draft {
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .draft:active { background: #f0f0f0; }
    .draft-label {
      font-size: 11px;
      font-weight: bold;
      color: #888;
      display: block;
      margin-bottom: 4px;
    }
    .draft p { font-size: 14px; color: #222; line-height: 1.5; }
    .empty { text-align: center; color: #aaa; padding: 40px 0; font-size: 14px; }
  </style>
  <script>
    // タップでテキストをクリップボードにコピー
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.draft').forEach(el => {
        el.addEventListener('click', () => {
          const text = el.querySelector('p').textContent;
          navigator.clipboard.writeText(text).then(() => {
            el.style.background = '#e8f5e9';
            setTimeout(() => el.style.background = '', 800);
          });
        });
      });
    });
  </script>
</head>
<body>
  <h1>📩 Threads コメント</h1>
  <p class="updated">更新: 2026-03-22 17:23 JST</p>
  <p class="empty">新着コメントはありません</p>
</body>
</html>
