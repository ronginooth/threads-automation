name: Threads 自動投稿

on:
  schedule:
    # 15分ごとに実行（GitHub cronのスキップ対策）
    # post.py側でscheduled:時刻をチェックし、時刻未到達はスキップする
    - cron: "*/15 * * * *"
  workflow_dispatch:  # 手動実行ボタン

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config: [ronginooth_ai]  # アカウント追加時はここに追記
    concurrency:
      group: threads-post-${{ matrix.config }}
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: パッケージインストール
        run: pip install requests python-dotenv pyyaml

      - name: 投稿実行
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN_RONGINOOTH_AI: ${{ secrets.THREADS_ACCESS_TOKEN_RONGINOOTH_AI }}
          THREADS_USER_ID_RONGINOOTH_AI: ${{ secrets.THREADS_USER_ID_RONGINOOTH_AI }}
          THREADS_APP_ID: ${{ secrets.THREADS_APP_ID }}
        run: python scripts/post.py --config configs/${{ matrix.config }}.yml

      - name: 投稿済みファイルをGitHubから削除
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data/${{ matrix.config }}/
          git commit -m "post: ${{ matrix.config }} 投稿済み $(date +'%Y-%m-%d %H:%M UTC')" || echo "変更なし"
          git push || echo "pushスキップ"
