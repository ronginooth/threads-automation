name: Threads 自動投稿

on:
  schedule:
    # 15分ごとに実行（GitHub cronのスキップ対策）
    # post.py側でscheduled:時刻をチェックし、時刻未到達はスキップする
    - cron: "*/15 * * * *"
  workflow_dispatch:  # 手動実行ボタン

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: パッケージインストール
        run: pip install requests python-dotenv

      - name: 投稿実行
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_APP_ID: ${{ secrets.THREADS_APP_ID }}
        run: python post.py

      - name: 投稿済みファイルをGitHubから削除
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data/queue/
          git commit -m "post: 投稿済みファイルをキューから削除 $(date +'%Y-%m-%d %H:%M UTC')" || echo "変更なし（投稿なし）"
          git push || echo "pushスキップ"
