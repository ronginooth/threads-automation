name: Threads 統計収集

on:
  schedule:
    # JST 23:00 = UTC 14:00
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config: [ronginooth_ai]  # アカウント追加時はここに追記
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: パッケージインストール
        run: pip install requests python-dotenv pyyaml

      - name: 統計収集
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN_RONGINOOTH_AI: ${{ secrets.THREADS_ACCESS_TOKEN_RONGINOOTH_AI }}
          THREADS_USER_ID_RONGINOOTH_AI: ${{ secrets.THREADS_USER_ID_RONGINOOTH_AI }}
        run: python stats.py --config configs/${{ matrix.config }}.yml

      - name: ダッシュボード更新
        run: python dashboard.py --config configs/${{ matrix.config }}.yml

      - name: 変更をコミット
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/${{ matrix.config }}/ docs/dashboard.html
          git diff --staged --quiet || git commit -m "stats+dashboard: ${{ matrix.config }} $(date +'%Y-%m-%d')"
          git push
