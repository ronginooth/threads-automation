name: Threads コメント取得 & リプライ案生成

on:
  schedule:
    # 2時間ごとに実行（7:00〜23:00 JST = 22:00〜14:00 UTC）
    - cron: "0 22,0,2,4,6,8,10,12,14 * * *"
  workflow_dispatch:  # 手動実行ボタン

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config: [ronginooth_ai]  # アカウント追加時はここに追記
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: パッケージインストール
        run: pip install requests python-dotenv anthropic pyyaml

      - name: コメント取得 & リプライ案生成
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN_RONGINOOTH_AI: ${{ secrets.THREADS_ACCESS_TOKEN_RONGINOOTH_AI }}
          THREADS_USER_ID_RONGINOOTH_AI: ${{ secrets.THREADS_USER_ID_RONGINOOTH_AI }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_replies.py --config configs/${{ matrix.config }}.yml

      - name: HTMLをGitHubにpush
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/replies.html data/${{ matrix.config }}/seen_comments.json
          git commit -m "replies: ${{ matrix.config }} $(date +'%Y-%m-%d %H:%M UTC')" || echo "変更なし"
          git push || echo "pushスキップ"
