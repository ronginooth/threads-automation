name: Threads リプライ投稿

on:
  workflow_dispatch:
    inputs:
      config:
        description: "アカウント設定名（例: ronginooth_ai）"
        required: true
        default: "ronginooth_ai"
      comment_id:
        description: "返信先のコメントID"
        required: true
      reply_text:
        description: "返信テキスト"
        required: true

permissions:
  contents: write

jobs:
  reply:
    runs-on: ubuntu-latest
    concurrency:
      group: threads-reply-${{ inputs.config }}
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: パッケージインストール
        run: pip install requests python-dotenv pyyaml

      - name: リプライ投稿
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN_RONGINOOTH_AI: ${{ secrets.THREADS_ACCESS_TOKEN_RONGINOOTH_AI }}
          THREADS_USER_ID_RONGINOOTH_AI: ${{ secrets.THREADS_USER_ID_RONGINOOTH_AI }}
        run: |
          python scripts/reply.py \
            --config "configs/${{ inputs.config }}.yml" \
            --comment-id "${{ inputs.comment_id }}" \
            --text "${{ inputs.reply_text }}"

      - name: ダッシュボード更新
        run: python scripts/dashboard.py --config configs/${{ inputs.config }}.yml

      - name: comments.json を更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add -A data/ docs/dashboard.html
          git commit -m "reply: ${{ inputs.config }} リプライ投稿 $(date +'%Y-%m-%d %H:%M UTC')" || echo "変更なし"
          git push || echo "pushスキップ"
